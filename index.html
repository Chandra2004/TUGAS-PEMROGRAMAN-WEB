<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tugas Pemrograman Web - Chandra Tri Antomo</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#00D1FF',
            dark: '#0D1117',
          }
        }
      }
    }
  </script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.8s ease-out forwards;
    }
    .glow-text {
      text-shadow: 0 0 10px rgba(0, 209, 255, 0.5);
    }
  </style>
</head>

<body class="bg-dark text-gray-200 min-h-screen flex items-center justify-center p-6 font-sans">
  <div class="w-full max-w-md animate-fade-in">
    <div class="bg-gray-900/80 backdrop-blur-md border border-gray-700/50 rounded-2xl shadow-2xl shadow-primary/20 overflow-hidden transition-all hover:shadow-primary/40">
      
      <div class="bg-gradient-to-r from-primary/20 to-blue-600/10 px-8 py-10 text-center relative">
        <div class="flex flex-col items-center gap-2 mb-4">
          <div id="greeting-badge" class="text-[10px] font-bold text-primary border border-primary/30 px-3 py-1 rounded-full tracking-widest uppercase bg-primary/5">
            INITIALIZING...
          </div>
          <div id="realtime-clock" class="text-2xl font-mono font-bold text-white glow-text">
            00:00:00
          </div>
          <div id="realtime-date" class="text-[11px] text-gray-400 tracking-tighter uppercase">
            Loading Date...
          </div>
        </div>
        
        <h1 class="text-3xl font-bold text-primary tracking-tight">
          Tugas Pemrograman Web
        </h1>
        <p class="mt-2 text-lg text-gray-300 font-medium">
          Chandra Tri Antomo
        </p>
        <p class="text-xs text-gray-500 uppercase tracking-widest mt-1">
          Informatika • Semester 4
        </p>
      </div>
      
      <div class="p-8">
        <div class="space-y-6">
          <a href="TUGAS-1/index.html" 
             class="group block bg-gray-800/50 hover:bg-gray-700/60 border border-gray-600 hover:border-primary/60 rounded-xl p-6 transition-all duration-300 active:scale-95 hover:shadow-lg hover:shadow-primary/10">
            <div class="flex items-center justify-between">
              <div>
                <h2 class="text-xl font-semibold text-white group-hover:text-primary transition-colors">
                  Tugas 1
                </h2>
                <p class="mt-1 text-sm text-gray-400 group-hover:text-gray-300">
                  Struktur Dasar HTML & CSS
                </p>
              </div>
              <span class="text-primary text-2xl font-bold group-hover:translate-x-2 transition-transform">
                →
              </span>
            </div>
          </a>

          <div class="block bg-gray-800/30 border border-gray-700/50 rounded-xl p-6 opacity-60 cursor-not-allowed">
            <div class="flex items-center justify-between">
              <div>
                <h2 class="text-xl font-semibold text-gray-400">
                  Tugas 2
                </h2>
                <p class="mt-1 text-sm text-gray-500">
                  Segera di-update...
                </p>
              </div>
              <span class="text-gray-500 text-2xl">
                ⏳
              </span>
            </div>
          </div>
        </div>
      </div>
      
      <div class="px-8 py-5 bg-black/30 text-center text-sm text-gray-500 border-t border-gray-700/50">
        Dibuat dengan ❤️ & Tailwind CSS • 2026
      </div>
    </div>
  </div>

  <script>
    function updateRealtimeInfo() {
      const now = new Date();
      
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('realtime-clock').innerText = `${hours}:${minutes}:${seconds}`;

      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('realtime-date').innerText = now.toLocaleDateString('id-ID', options);

      const hour = now.getHours();
      let greet;
      if (hour < 11) greet = "Selamat Pagi 🌅";
      else if (hour < 15) greet = "Selamat Siang ☀️";
      else if (hour < 19) greet = "Selamat Sore 🌇";
      else greet = "Selamat Malam 🌙";
      
      const badge = document.getElementById('greeting-badge');
      if (badge.innerText !== greet) {
        badge.innerText = greet;
      }
    }

    setInterval(updateRealtimeInfo, 1000);
    updateRealtimeInfo();
  </script>
</body>
</html>
